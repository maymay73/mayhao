<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Регистрация — Mayhao</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;500;600;700;800&family=DM+Sans:ital,opsz,wght@0,9..40,300;0,9..40,400;0,9..40,500;1,9..40,300&display=swap" rel="stylesheet" />
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet" />
  <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" rel="stylesheet" />
  <link rel="stylesheet" href="../style.css" />
</head>
<body>
<div class="d-flex" style="min-height:100vh;">
  <div class="auth-left">
    <div class="auth-left-inner">
      <a href="../index.html" class="vi-logo auth-logo">
        <span class="logo-mark">MH</span>
        <span class="logo-text">may<em>hao</em></span>
      </a>
      <h1 class="auth-title">Создать аккаунт.</h1>
      <p class="auth-sub">Бесплатно. Без карты. Начни прямо сейчас.</p>

      <div id="registerError" class="alert alert-danger py-2 px-3 rounded-3 mb-3" style="display:none;font-size:0.875rem;"></div>

      <form id="registerForm" novalidate>
        <div class="form-group-vi">
          <label class="form-label-vi">Имя пользователя</label>
          <input type="text" name="username" class="form-input-vi" placeholder="вашеимя" autocomplete="username" />
          <div class="form-error" data-error="username">Имя должно быть от 2 до 24 символов</div>
        </div>
        <div class="form-group-vi">
          <label class="form-label-vi">Email</label>
          <input type="email" name="email" class="form-input-vi" placeholder="вы@example.com" autocomplete="email" />
          <div class="form-error" data-error="email">Введите корректный email</div>
        </div>
        <div class="form-group-vi">
          <label class="form-label-vi">Пароль</label>
          <input type="password" id="regPassword" name="password" class="form-input-vi" placeholder="Минимум 8 символов" autocomplete="new-password" />
          <button type="button" class="password-toggle" id="toggleRegPwd"><i class="bi bi-eye"></i></button>
          <div class="strength-bar"><div class="strength-fill" id="strengthFill"></div></div>
          <div class="strength-text" id="strengthText"></div>
          <div class="form-error" data-error="password">Минимум 8 символов</div>
        </div>
        <div class="form-group-vi">
          <label class="form-label-vi">Подтвердите пароль</label>
          <input type="password" name="confirm" class="form-input-vi" placeholder="Повторите пароль" autocomplete="new-password" />
          <div class="form-error" data-error="confirm">Пароли не совпадают</div>
        </div>
        <div class="d-flex align-items-start gap-2 mb-4 mt-2">
          <input type="checkbox" id="agreeTerms" style="margin-top:3px;accent-color:var(--accent);" />
          <label for="agreeTerms" style="font-size:0.8rem;color:var(--gray-500);cursor:pointer;">
            Я принимаю <a href="#" style="color:var(--accent);">Условия использования</a> и <a href="#" style="color:var(--accent);">Политику конфиденциальности</a>
          </label>
        </div>
        <button type="submit" class="form-submit-vi">Создать аккаунт</button>
      </form>

      <div class="form-footer mt-4">
        Уже есть аккаунт? <a href="login.html">Войти</a>
      </div>
    </div>
  </div>

  <div class="auth-bg-split">
    <img src="https://picsum.photos/seed/fashion-register/800/1200" alt="стиль" />
    <div class="auth-bg-tagline" style="position:absolute;top:50%;left:40px;right:40px;transform:translateY(-50%);color:var(--white);text-align:center;">
      <div style="font-family:var(--font-display);font-size:2.4rem;font-weight:800;line-height:1.1;">Твой стиль.<br /><span style="color:var(--accent);">Твоя история.</span></div>
      <div style="font-size:0.9rem;color:rgba(255,255,255,0.6);margin-top:14px;">Тысячи образов ждут тебя.</div>
    </div>
  </div>
</div>

<div class="vi-toast" id="viToast"></div>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
<script src="../script.js"></script>
<script>
  document.addEventListener('DOMContentLoaded', () => {
    // Переключение видимости пароля
    document.getElementById('toggleRegPwd').addEventListener('click', () => {
      const pwd = document.getElementById('regPassword');
      const icon = document.querySelector('#toggleRegPwd i');
      pwd.type = pwd.type === 'password' ? 'text' : 'password';
      icon.className = pwd.type === 'password' ? 'bi bi-eye' : 'bi bi-eye-slash';
    });

    // Индикатор сложности пароля
    document.getElementById('regPassword').addEventListener('input', function () {
      const v = this.value;
      let score = 0;
      if (v.length >= 8) score++;
      if (/[A-Z]/.test(v)) score++;
      if (/[0-9]/.test(v)) score++;
      if (/[^A-Za-z0-9]/.test(v)) score++;
      const fill = document.getElementById('strengthFill');
      const text = document.getElementById('strengthText');
      const levels = ['', 'Слабый', 'Средний', 'Хороший', 'Надёжный'];
      const colors = ['', '#e53e3e', '#f6ad55', '#68d391', '#38a169'];
      fill.style.width = `${(score / 4) * 100}%`;
      fill.style.background = colors[score] || 'transparent';
      text.textContent = v.length ? levels[score] || '' : '';
    });

    const form = document.getElementById('registerForm');

    setupFormValidation('registerForm', [
      { field: 'username', validates: v => v.length >= 2 && v.length <= 24, message: 'Имя должно быть от 2 до 24 символов' },
      { field: 'email', validates: v => /^[^\s@]+@[^\s@]+\.[^\s@]+$/.test(v), message: 'Введите корректный email' },
      { field: 'password', validates: v => v.length >= 8, message: 'Минимум 8 символов' },
      { field: 'confirm', validates: v => v === form.querySelector('[name="password"]').value, message: 'Пароли не совпадают' },
    ]);

    form.addEventListener('mh:valid', () => {
      if (!document.getElementById('agreeTerms').checked) {
        showToast('Примите условия использования');
        return;
      }
      const username = form.querySelector('[name="username"]').value;
      const email = form.querySelector('[name="email"]').value;
      const password = form.querySelector('[name="password"]').value;
      const result = registerUser(username, email, password);
      if (result.error) {
        const errEl = document.getElementById('registerError');
        errEl.textContent = result.error;
        errEl.style.display = 'block';
      } else {
        showToast('🎉 Аккаунт создан! Добро пожаловать!');
        setTimeout(() => window.location.href = '../index.html', 900);
      }
    });
  });
</script>
</body>
</html>
