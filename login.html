<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Вход — Mayhao</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;500;600;700;800&family=DM+Sans:ital,opsz,wght@0,9..40,300;0,9..40,400;0,9..40,500;1,9..40,300&display=swap" rel="stylesheet" />
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet" />
  <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" rel="stylesheet" />
  <link rel="stylesheet" href="../style.css" />
</head>
<body>
<div class="d-flex" style="min-height:100vh;">
  <div class="auth-left">
    <div class="auth-left-inner">
      <a href="../index.html" class="vi-logo auth-logo">
        <span class="logo-mark">MH</span>
        <span class="logo-text">may<em>hao</em></span>
      </a>
      <h1 class="auth-title">Добро пожаловать.</h1>
      <p class="auth-sub">Войдите, чтобы получить доступ к коллекциям и персональной ленте моды.</p>

      <div id="loginError" class="alert alert-danger py-2 px-3 rounded-3 mb-3" style="display:none;font-size:0.875rem;"></div>

      <form id="loginForm" novalidate>
        <div class="form-group-vi">
          <label class="form-label-vi">Email</label>
          <input type="email" name="email" class="form-input-vi" placeholder="вы@example.com" autocomplete="email" />
          <div class="form-error" data-error="email">Введите корректный email</div>
        </div>
        <div class="form-group-vi">
          <label class="form-label-vi">Пароль</label>
          <input type="password" id="loginPassword" name="password" class="form-input-vi" placeholder="Ваш пароль" autocomplete="current-password" />
          <button type="button" class="password-toggle" id="togglePwd"><i class="bi bi-eye"></i></button>
          <div class="form-error" data-error="password">Минимум 6 символов</div>
        </div>
        <div class="d-flex justify-content-end mb-3">
          <a href="reset.html" style="font-size:0.8rem;color:var(--accent);">Забыли пароль?</a>
        </div>
        <button type="submit" class="form-submit-vi">Войти</button>
      </form>

      <div class="divider">или</div>

      <button class="btn-ghost w-100 d-flex align-items-center justify-content-center gap-2" onclick="demoLogin()" style="padding:11px;">
        <i class="bi bi-lightning-charge-fill" style="color:var(--accent);"></i>
        Войти как демо-пользователь
      </button>

      <div class="form-footer mt-4">
        Нет аккаунта? <a href="register.html">Зарегистрироваться</a>
      </div>
    </div>
  </div>

  <div class="auth-bg-split">
    <img src="https://picsum.photos/seed/fashion-login/800/1200" alt="мода" />
    <div class="auth-bg-quote">
      «Мода — это способ сказать<br />кто ты такой,<br /><span>не произнося ни слова.</span>»
    </div>
  </div>
</div>

<div class="vi-toast" id="viToast"></div>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
<script src="../script.js"></script>
<script>
  document.addEventListener('DOMContentLoaded', () => {
    document.getElementById('togglePwd').addEventListener('click', () => {
      const pwd = document.getElementById('loginPassword');
      const icon = document.querySelector('#togglePwd i');
      pwd.type = pwd.type === 'password' ? 'text' : 'password';
      icon.className = pwd.type === 'password' ? 'bi bi-eye' : 'bi bi-eye-slash';
    });

    setupFormValidation('loginForm', [
      { field: 'email', validates: v => /^[^\s@]+@[^\s@]+\.[^\s@]+$/.test(v), message: 'Введите корректный email' },
      { field: 'password', validates: v => v.length >= 6, message: 'Минимум 6 символов' },
    ]);

    document.getElementById('loginForm').addEventListener('mh:valid', () => {
      const email = document.getElementById('loginForm').querySelector('[name="email"]').value;
      const password = document.getElementById('loginForm').querySelector('[name="password"]').value;
      const result = loginUser(email, password);
      if (result.error) {
        const errEl = document.getElementById('loginError');
        errEl.textContent = result.error;
        errEl.style.display = 'block';
      } else {
        showToast('✓ Вы вошли в аккаунт!');
        setTimeout(() => window.location.href = '../index.html', 900);
      }
    });
  });

  function demoLogin() {
    const email = 'demo@mayhao.app';
    const users = getUsers();
    if (!users.find(u => u.email === email)) {
      registerUser('Демо Пользователь', email, 'demo123');
    } else {
      loginUser(email, 'demo123');
    }
    showToast('✓ Вы вошли как Демо Пользователь');
    setTimeout(() => window.location.href = '../index.html', 900);
  }
</script>
</body>
</html>
