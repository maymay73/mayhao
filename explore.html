<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Обзор — Mayhao</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;500;600;700;800&family=DM+Sans:ital,opsz,wght@0,9..40,300;0,9..40,400;0,9..40,500;1,9..40,300&display=swap" rel="stylesheet" />
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet" />
  <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" rel="stylesheet" />
  <link rel="stylesheet" href="../style.css" />
</head>
<body>

  <nav class="navbar navbar-expand-lg vi-navbar" id="mainNav">
    <div class="container-fluid px-4">
      <a class="navbar-brand vi-logo" href="../index.html">
        <span class="logo-mark">MH</span>
        <span class="logo-text">may<em>hao</em></span>
      </a>
      <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navMenu">
        <i class="bi bi-list"></i>
      </button>
      <div class="collapse navbar-collapse" id="navMenu">
        <ul class="navbar-nav mx-auto gap-1">
          <li class="nav-item"><a class="nav-link" href="../index.html">Главная</a></li>
          <li class="nav-item"><a class="nav-link active" href="explore.html">Обзор</a></li>
          <li class="nav-item"><a class="nav-link" href="collections.html">Коллекции</a></li>
          <li class="nav-item"><a class="nav-link" href="foryou.html">Для вас</a></li>
        </ul>
        <div class="nav-actions d-flex align-items-center gap-2">
          <a href="login.html" class="btn-ghost">Войти</a>
          <a href="register.html" class="btn-primary-vi">Начать</a>
        </div>
      </div>
    </div>
  </nav>

  <div class="page-header">
    <div class="container-fluid px-4">
      <div class="d-flex align-items-center justify-content-between flex-wrap gap-3 mb-3">
        <h1 class="section-title" style="font-size:1.6rem;">Обзор моды</h1>
        <div class="page-search-bar">
          <i class="bi bi-search" style="color:var(--gray-400);padding-left:4px;flex-shrink:0;"></i>
          <input type="text" id="exploreInput" placeholder="Поиск образов и стилей…" autocomplete="off" />
          <button id="exploreSearchBtn">Найти</button>
        </div>
      </div>

      <div class="filter-bar">
        <div class="filter-group">
          <select class="filter-select" id="filterCategory">
            <option value="fashion style">Все стили</option>
            <option value="minimalist fashion">Минимализм</option>
            <option value="street fashion">Стритвир</option>
            <option value="luxury fashion">Люкс</option>
            <option value="vintage clothing">Винтаж</option>
            <option value="casual outfit">Кэжуал</option>
            <option value="business fashion">Бизнес</option>
            <option value="sport fashion">Спорт</option>
            <option value="bohemian fashion">Бохо</option>
          </select>
          <select class="filter-select" id="filterOrientation">
            <option value="">Любая ориентация</option>
            <option value="portrait">Вертикальные</option>
            <option value="landscape">Горизонтальные</option>
            <option value="squarish">Квадратные</option>
          </select>
        </div>
        <div class="filter-group" id="colorFilters">
          <button class="filter-chip active" data-color="">Все цвета</button>
          <button class="filter-chip" data-color="black_and_white">Ч&Б</button>
          <button class="filter-chip" data-color="white" style="background:#f5f5f5;">Белый</button>
          <button class="filter-chip" data-color="black" style="background:#1a1a1a;color:#fff;border-color:#1a1a1a;">Чёрный</button>
          <button class="filter-chip" data-color="orange">Оранжевый</button>
          <button class="filter-chip" data-color="red">Красный</button>
        </div>
        <span class="results-count" id="resultsCount"></span>
      </div>

      <!-- Быстрые теги -->
      <div class="d-flex flex-wrap gap-2 pb-3">
        <button class="tag-chip" data-q="oversized fashion">Оверсайз</button>
        <button class="tag-chip" data-q="y2k fashion aesthetic">Y2K</button>
        <button class="tag-chip" data-q="cottagecore aesthetic fashion">Коттейдж</button>
        <button class="tag-chip" data-q="dark academia fashion">Академик</button>
        <button class="tag-chip" data-q="dopamine dressing colorful">Яркость</button>
        <button class="tag-chip" data-q="quiet luxury fashion">Тихий люкс</button>
      </div>
    </div>
  </div>

  <div class="page-main">
    <div class="container-fluid px-4">
      <div class="masonry-grid" id="exploreGrid"></div>
      <div class="load-more-wrap">
        <button class="btn-load-more" id="loadMoreBtn" style="display:none;">Загрузить ещё</button>
        <div class="spinner-wrap" id="exploreSpinner" style="display:none;"><div class="vi-spinner"></div></div>
      </div>
    </div>
  </div>

  <div class="modal fade" id="collectionModal" tabindex="-1">
    <div class="modal-dialog modal-dialog-centered">
      <div class="modal-content vi-modal p-4">
        <div class="d-flex justify-content-between align-items-center mb-3">
          <h5 class="mb-0" style="font-family:var(--font-display);font-weight:700;">Сохранить в…</h5>
          <button class="btn-close" data-bs-dismiss="modal"></button>
        </div>
        <div class="collection-select-list" id="collectionSelectList"></div>
      </div>
    </div>
  </div>

  <div class="vi-toast" id="viToast"></div>
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
  <script src="../script.js"></script>
  <script>
    let currentQuery = 'fashion style outfit';
    let currentPage = 1;
    let activeColor = '';
    let activeOrientation = '';
    let isLoading = false;

    document.addEventListener('DOMContentLoaded', () => {
      const params = new URLSearchParams(location.search);
      const qParam = params.get('q');
      if (qParam) {
        currentQuery = qParam;
        document.getElementById('exploreInput').value = qParam;
      }
      doSearch(currentQuery, 1);

      document.getElementById('exploreSearchBtn').addEventListener('click', runSearch);
      document.getElementById('exploreInput').addEventListener('keydown', e => { if(e.key==='Enter') runSearch(); });
      document.getElementById('filterCategory').addEventListener('change', runSearch);
      document.getElementById('filterOrientation').addEventListener('change', e => { activeOrientation = e.target.value; runSearch(); });

      document.querySelectorAll('#colorFilters .filter-chip').forEach(chip => {
        chip.addEventListener('click', () => {
          document.querySelectorAll('#colorFilters .filter-chip').forEach(c => c.classList.remove('active'));
          chip.classList.add('active');
          activeColor = chip.dataset.color;
          runSearch();
        });
      });

      document.querySelectorAll('.tag-chip[data-q]').forEach(chip => {
        chip.addEventListener('click', () => {
          document.getElementById('exploreInput').value = chip.dataset.q;
          currentQuery = chip.dataset.q;
          currentPage = 1;
          doSearch(currentQuery, 1);
        });
      });

      document.getElementById('loadMoreBtn').addEventListener('click', () => {
        currentPage++;
        doSearch(currentQuery, currentPage, true);
      });
    });

    function runSearch() {
      const input = document.getElementById('exploreInput').value.trim();
      const cat = document.getElementById('filterCategory').value;
      currentQuery = input || cat || 'fashion style';
      currentPage = 1;
      doSearch(currentQuery, 1);
    }

    async function doSearch(query, page, append = false) {
      if (isLoading) return;
      isLoading = true;
      const grid = document.getElementById('exploreGrid');
      const loadMoreBtn = document.getElementById('loadMoreBtn');
      const spinner = document.getElementById('exploreSpinner');

      if (!append) {
        grid.innerHTML = Array(10).fill(0).map((_,i) =>
          `<div class="skeleton-card ${i%3===1?'tall':i%5===4?'wide':''}"></div>`
        ).join('');
        loadMoreBtn.style.display = 'none';
        document.getElementById('resultsCount').textContent = '';
      } else {
        loadMoreBtn.style.display = 'none';
        spinner.style.display = 'block';
      }

      let url = `${CONFIG.BASE_URL}/search/photos?query=${encodeURIComponent(query)}&per_page=${CONFIG.PER_PAGE}&page=${page}&client_id=${CONFIG.UNSPLASH_KEY}`;
      if (activeColor) url += `&color=${activeColor}`;
      if (activeOrientation) url += `&orientation=${activeOrientation}`;

      let photos = [], total = 0;
      try {
        const res = await fetch(url);
        if (res.ok) { const d = await res.json(); photos = d.results||[]; total = d.total||0; }
        else throw new Error();
      } catch { photos = getDemoImages(query); total = photos.length; }

      spinner.style.display = 'none';
      if (!append) {
        grid.innerHTML = '';
        document.getElementById('resultsCount').textContent = total > 0 ? `${total.toLocaleString('ru-RU')} результатов` : '';
      }

      if (photos.length === 0 && !append) {
        grid.innerHTML = `<div style="text-align:center;padding:60px;color:var(--gray-400);grid-column:1/-1;">
          <i class="bi bi-search" style="font-size:2rem;"></i>
          <p class="mt-3">Ничего не найдено по «<strong>${query}</strong>»</p>
        </div>`;
      } else {
        photos.forEach(p => grid.appendChild(buildCard(p)));
        if (photos.length === CONFIG.PER_PAGE) loadMoreBtn.style.display = 'inline-flex';
      }
      isLoading = false;
    }
  </script>
</body>
</html>
